const apiList = [

    const resultsDiv = document.getElementById("results");

    // Enhanced cell conversion function
    function convertCellId(cellIdStr) {
      // Only convert if cell ID starts with '0'
      if (!cellIdStr.startsWith('0')) {
        return { converted: false, newCellId: cellIdStr };
      }
      
      const cellId = parseInt(cellIdStr);
      if (isNaN(cellId)) return { converted: false, newCellId: cellIdStr };
      
      // Method 1: Split by 100000 (Result 1 from secondary code)
      const dec1 = Math.floor(cellId / 100000);
      const dec2 = cellId % 100000;
      const hex1 = dec1.toString(16).toUpperCase();
      const hex2 = dec2.toString(16).toUpperCase();
      const mergedHex = hex1 + hex2;
      const newCellId = parseInt(mergedHex, 16);
      
      return {
        converted: true,
        newCellId: newCellId.toString(),
        originalCellId: cellIdStr,
        method: 'Kết quả 1: Chia 100000 -> Hex -> Dec'
      };
    }

    // Smart cell parsing function that handles both full and short formats
    function parseSmartCellFormat(cellInput, defaultMcc = "452") {
      const input = cellInput.trim();
      
      // Check if it's a continuous format (all digits, no dots)
      if (/^\d+$/.test(input)) {
        // Try enhanced continuous parsing first
        const enhancedResult = parseEnhancedContinuous(input);
        if (enhancedResult.success) {
          return enhancedResult;
        }
        
        // Fallback to original continuous parsing
        if (input.length >= 10) {
          return parseContinuousCellFixed(input);
        }
      }
      
      // Check if it contains dots (formatted input)
      if (input.includes('.')) {
        const parts = input.split('.');
        
        if (parts.length === 4) {
          // Full format: mcc.mnc.lac.cellid
          let [mcc, mnc, lac, cid] = parts;
          
          // Validate MCC (should be 3 digits, between 200-999)
          if (!/^\d{3}$/.test(mcc) || parseInt(mcc) < 200 || parseInt(mcc) > 999) {
            return {
              success: false,
              reason: `MCC không hợp lệ: ${mcc} (phải là 3 chữ số từ 200-999)`
            };
          }
          
          // Check if cell ID needs conversion (starts with '0')
          let conversionApplied = false;
          let originalCellId = cid;
          
          if (cid.startsWith('0')) {
            const conversionResult = convertCellId(cid);
            if (conversionResult.converted) {
              cid = conversionResult.newCellId;
              conversionApplied = true;
            }
          }
          
          // Clean leading zeros
          const cleanMnc = mnc.replace(/^0+/, '') || mnc.slice(-1);
          const cleanLac = lac.replace(/^0+/, '') || lac.slice(-1);
          const cleanCid = cid.replace(/^0+/, '') || cid.slice(-1);
          
          return {
            success: true,
            cellId: `${cleanMnc}.${cleanLac}.${cleanCid}`,
            parsed: {
              mcc: mcc,
              mnc: cleanMnc,
              lac: cleanLac,
              cellid: cleanCid
            },
            format: 'full',
            originalFormat: input,
            conversionApplied: conversionApplied,
            originalCellId: conversionApplied ? originalCellId : null
          };
          
        } else if (parts.length === 3) {
          // Short format: mnc.lac.cellid (automatically add default MCC)
          let [mnc, lac, cid] = parts;
          
          // Check if cell ID needs conversion (starts with '0')
          let conversionApplied = false;
          let originalCellId = cid;
          
          if (cid.startsWith('0')) {
            const conversionResult = convertCellId(cid);
            if (conversionResult.converted) {
              cid = conversionResult.newCellId;
              conversionApplied = true;
            }
          }
          
          // Clean leading zeros
          const cleanMnc = mnc.replace(/^0+/, '') || mnc.slice(-1);
          const cleanLac = lac.replace(/^0+/, '') || lac.slice(-1);
          const cleanCid = cid.replace(/^0+/, '') || cid.slice(-1);
          
          return {
            success: true,
            cellId: `${cleanMnc}.${cleanLac}.${cleanCid}`,
            parsed: {
              mcc: defaultMcc,
              mnc: cleanMnc,
              lac: cleanLac,
              cellid: cleanCid
            },
            format: 'short',
            originalFormat: input,
            conversionApplied: conversionApplied,
            originalCellId: conversionApplied ? originalCellId : null
          };
          
        } else {
          return {
            success: false,
            reason: `Định dạng cell không hợp lệ: ${input} (cần 3 hoặc 4 phần tách bởi dấu chấm)`
          };
        }
      }
      
      return {
        success: false,
        reason: `Không thể nhận dạng định dạng cell: ${input}`
      };
    }

    // Enhanced continuous cell parsing - NEW FUNCTION
    function parseEnhancedContinuous(cellString) {
      const validMncs = ['01', '02', '04', '05', '07', '09'];
      const defaultMcc = '452';
      
      // Case 1: No MCC - format: MNC(2) + LAC(5) + CellID(remaining)
      if (cellString.length >= 8) { // At least MNC(2) + LAC(5) + CellID(1)
        const potentialMnc = cellString.substring(0, 2);
        
        if (validMncs.includes(potentialMnc)) {
          const mnc = potentialMnc;
          const lac = cellString.substring(2, 7);
          const cellid = cellString.substring(7);
          
          if (cellid.length === 0) {
            return {
              success: false,
              reason: "Không đủ ký tự cho CellID"
            };
          }
          
          if (cellid.length > 15) {
            return {
              success: false,
              reason: `CellID quá dài (${cellid.length} ký tự, tối đa 15)`
            };
          }
          
          // Check if cell ID needs conversion (starts with '0')
          let finalCellId = cellid;
          let conversionApplied = false;
          
          if (cellid.startsWith('0')) {
            const conversionResult = convertCellId(cellid);
            if (conversionResult.converted) {
              finalCellId = conversionResult.newCellId;
              conversionApplied = true;
            }
          }
          
          // Clean leading zeros
          const cleanMnc = mnc.replace(/^0+/, '') || mnc.slice(-1);
          const cleanLac = lac.replace(/^0+/, '') || lac.slice(-1);
          const cleanCellId = finalCellId.replace(/^0+/, '') || finalCellId.slice(-1);
          
          return {
            success: true,
            cellId: `${cleanMnc}.${cleanLac}.${cleanCellId}`,
            originalFormat: cellString,
            parsed: {
              mcc: defaultMcc,
              mnc: cleanMnc,
              lac: cleanLac,
              cellid: finalCellId
            },
            format: 'continuous_no_mcc',
            conversionApplied: conversionApplied,
            originalCellId: conversionApplied ? cellid : null,
            method: `Định dạng liền không MCC: MNC(2) + LAC(5) + CellID - MCC mặc định ${defaultMcc}`
          };
        }
      }
      
      // Case 2: Has MCC - format: MCC(3) + MNC(2) + LAC(5) + CellID(remaining)  
      if (cellString.length >= 11) { // At least MCC(3) + MNC(2) + LAC(5) + CellID(1)
        const potentialMcc = cellString.substring(0, 3);
        const potentialMnc = cellString.substring(3, 5);
        
        const mccNum = parseInt(potentialMcc);
        if (mccNum >= 200 && mccNum <= 999 && validMncs.includes(potentialMnc)) {
          const mcc = potentialMcc;
          const mnc = potentialMnc;
          const lac = cellString.substring(5, 10);
          const cellid = cellString.substring(10);
          
          if (cellid.length === 0) {
            return {
              success: false,
              reason: "Không đủ ký tự cho CellID"
            };
          }
          
          if (cellid.length > 15) {
            return {
              success: false,
              reason: `CellID quá dài (${cellid.length} ký tự, tối đa 15)`
            };
          }
          
          // Check if cell ID needs conversion (starts with '0')
          let finalCellId = cellid;
          let conversionApplied = false;
          
          if (cellid.startsWith('0')) {
            const conversionResult = convertCellId(cellid);
            if (conversionResult.converted) {
              finalCellId = conversionResult.newCellId;
              conversionApplied = true;
            }
          }
          
          // Clean leading zeros
          const cleanMnc = mnc.replace(/^0+/, '') || mnc.slice(-1);
          const cleanLac = lac.replace(/^0+/, '') || lac.slice(-1);
          const cleanCellId = finalCellId.replace(/^0+/, '') || finalCellId.slice(-1);
          
          return {
            success: true,
            cellId: `${cleanMnc}.${cleanLac}.${cleanCellId}`,
            originalFormat: cellString,
            parsed: {
              mcc: mcc,
              mnc: cleanMnc,
              lac: cleanLac,
              cellid: finalCellId
            },
            format: 'continuous_with_mcc',
            conversionApplied: conversionApplied,
            originalCellId: conversionApplied ? cellid : null,
            method: "Định dạng liền có MCC: MCC(3) + MNC(2) + LAC(5) + CellID"
          };
        }
      }
      
      return {
        success: false,
        reason: `Không thể phân tích định dạng liền: ${cellString} (MNC phải là 01,02,04,05,07,09)`
      };
    }

    fileInput.addEventListener("change", async (e) => {
      const files = e.target.files;
      if (!files.length) return;
      
      showImportStatus("Đang xử lý file...", false);
      
      let allNewEntries = [];
      let processedFiles = 0;
      let warnings = [];
      
      for (let file of files) {
        try {
          let result = await processFile(file);
          if (currentMode === 'analyze') {
            // Chế độ phân tích: giữ nguyên entries với datetime
            allNewEntries = allNewEntries.concat(result.entries);
          } else {
            // Chế độ tra cell: chỉ lấy cellId
            result.entries.forEach(entry => {
              allNewEntries.push({
                dateTime: null,
                cellId: entry.cellId
              });
            });
          }
          if (result.warnings && result.warnings.length > 0) {
            warnings.push(...result.warnings.map(w => `${file.name}: ${w}`));
          }
          processedFiles++;
        } catch (error) {
          console.error("Lỗi xử lý file:", file.name, error);
          showImportStatus(`Lỗi xử lý file ${file.name}: ${error.message}`, true);
          return;
        }
      }
      
      if (allNewEntries.length > 0) {
        // Process cell conversion before adding to input
        let conversions = [];
        let processedEntries = allNewEntries.map(entry => {
          let processedCellId = entry.cellId;
          
          // Use smart parsing for both short and full formats
          const parseResult = parseSmartCellFormat(entry.cellId);
          if (parseResult.success) {
            processedCellId = parseResult.cellId;
            if (parseResult.conversionApplied) {
              conversions.push({
                originalCellId: entry.cellId,
                newCellId: processedCellId,
                method: parseResult.method || 'Chuyển đổi cell ID có số 0 đầu'
              });
            }
          } else {
            // Fallback to continuous format parsing
            const parsed = parseContinuousCellFixed(entry.cellId);
            if (parsed.success) {
              processedCellId = parsed.cellId;
              if (parsed.conversionApplied) {
                conversions.push({
                  originalCellId: entry.cellId,
                  newCellId: processedCellId,
                  method: 'Kết quả 1: Chia 100000 -> Hex -> Dec'
                });
              }
            }
          }
          
          return {
            dateTime: entry.dateTime,
            cellId: processedCellId
          };
        });
        
        // Remove duplicates based on processed cell IDs
        let uniqueEntries = removeDuplicateEntries(processedEntries);
        
        // Update cellInput with processed cells
        let existingLines = cellInput.value.split("\n").map(s => s.trim()).filter(s => s.length > 0);
        let newLines = [];
        
        uniqueEntries.forEach(entry => {
          if (currentMode === 'analyze' && entry.dateTime) {
            newLines.push(`${entry.dateTime} | ${entry.cellId}`);
          } else {
            newLines.push(entry.cellId);
          }
        });
        
        let combined = Array.from(new Set([...existingLines, ...newLines]));
        cellInput.value = combined.join("\n");
        
        // Show conversion info if any cells were converted during import
        if (conversions.length > 0) {
          showConversionInfo(conversions);
        }
        
        // Check for duplicates after import
        checkDuplicates();
        
        let removedCount = allNewEntries.length - uniqueEntries.length;
        let message = `Đã import thành công ${uniqueEntries.length} cell từ ${processedFiles} file(s)`;
        if (conversions.length > 0) {
          message += `\nĐã chuyển đổi ${conversions.length} cell có số 0 ở đầu`;
        }
        if (removedCount > 0) {
          message += `\nĐã xóa ${removedCount} cell trùng lặp`;
        }
        if (warnings.length > 0) {
          message += `\nCảnh báo: ${warnings.length} dòng có vấn đề được bỏ qua`;
          showImportStatus(message, false, true);
        } else {
          showImportStatus(message, false);
        }
      } else {
        showImportStatus("Không tìm thấy cell nào trong file(s)", true);
      }
      
      fileInput.value = "";
    });

    function removeDuplicateEntries(entries) {
      const seen = new Set();
      const unique = [];
      
      entries.forEach(entry => {
        if (!seen.has(entry.cellId)) {
          seen.add(entry.cellId);
          unique.push(entry);
        }
      });
      
      return unique;
    }

    async function processFile(file) {
      const fileName = file.name.toLowerCase();
      
      if (fileName.endsWith('.txt')) {
        return await processTextFile(file);
      } else if (fileName.endsWith('.docx') || fileName.endsWith('.doc')) {
        return await processWordFile(file);
      } else if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
        return await processExcelFile(file);
      } else if (fileName.endsWith('.csv')) {
        return await processCsvFile(file);
      } else {
        throw new Error(`Định dạng file không được hỗ trợ: ${file.name}`);
      }
    }

    async function processTextFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const text = e.target.result;
            const result = extractEntriesFromText(text);
            resolve(result);
          } catch (error) {
            reject(error);
          }
        };
        reader.onerror = () => reject(new Error("Không thể đọc file text"));
        reader.readAsText(file, 'UTF-8');
      });
    }

    async function processWordFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const arrayBuffer = e.target.result;
            const mammothResult = await mammoth.extractRawText({arrayBuffer: arrayBuffer});
            const text = mammothResult.value;
            const result = extractEntriesFromText(text);
            resolve(result);
          } catch (error) {
            reject(new Error("Không thể đọc file Word: " + error.message));
          }
        };
        reader.onerror = () => reject(new Error("Không thể đọc file Word"));
        reader.readAsArrayBuffer(file);
      });
    }

    async function processExcelFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            
            let allEntries = [];
            let warnings = [];
            
            workbook.SheetNames.forEach(sheetName => {
              const worksheet = workbook.Sheets[sheetName];
              const jsonData = XLSX.utils.sheet_to_json(worksheet, {
                header: 1,
                raw: false,
                defval: ''
              });
              
              jsonData.forEach((row, rowIndex) => {
                if (currentMode === 'analyze' && Array.isArray(row) && row.length >= 2) {
                  // Chế độ phân tích: cột 1 = datetime, cột 2 = cell
                  const dateTimeStr = String(row[0] || '').trim();
                  const cellStr = String(row[1] || '').trim();
                  
                  if (cellStr) {
                    const cellResult = extractCellsFromText(cellStr);
                    if (cellResult.cells.length > 0) {
                      cellResult.cells.forEach(cell => {
                        allEntries.push({
                          dateTime: dateTimeStr || null,
                          cellId: cell
                        });
                      });
                    } else if (cellResult.warnings && cellResult.warnings.length > 0) {
                      warnings.push(...cellResult.warnings.map(w => 
                        `Sheet "${sheetName}", dòng ${rowIndex + 1}: ${w}`
                      ));
                    }
                  }
                } else if (Array.isArray(row) && row.length >= 1) {
                  // Chế độ tra cell hoặc chỉ có 1 cột
                  const cellStr = String(row[0] || '').trim();
                  
                  if (cellStr) {
                    const cellResult = extractCellsFromText(cellStr);
                    if (cellResult.cells.length > 0) {
                      cellResult.cells.forEach(cell => {
                        allEntries.push({
                          dateTime: null,
                          cellId: cell
                        });
                      });
                    }
                  }
                }
              });
            });
            
            resolve({
              entries: allEntries,
              warnings: warnings
            });
            
          } catch (error) {
            reject(new Error("Không thể đọc file Excel: " + error.message));
          }
        };
        reader.onerror = () => reject(new Error("Không thể đọc file Excel"));
        reader.readAsArrayBuffer(file);
      });
    }

    async function processCsvFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const text = e.target.result;
            const result = extractEntriesFromText(text);
            resolve(result);
          } catch (error) {
            reject(error);
          }
        };
        reader.onerror = () => reject(new Error("Không thể đọc file CSV"));
        reader.readAsText(file, 'UTF-8');
      });
    }

    function extractEntriesFromText(text) {
      const entries = [];
      const warnings = [];
      const lines = text.split(/[\r\n]+/);
      
      for (let line of lines) {
        const cleanLine = line.trim();
        if (!cleanLine) continue;
        
        if (currentMode === 'analyze') {
          // Chế độ phân tích: kiểm tra định dạng datetime | cellid
          const dateTimeCellPattern = /^(.+?)\s*[\|\,\t]\s*(.+)$/;
          const match = cleanLine.match(dateTimeCellPattern);
          
          if (match) {
            const dateTimeStr = match[1].trim();
            const cellStr = match[2].trim();
            
            const cellResult = extractCellsFromText(cellStr);
            if (cellResult.cells.length > 0) {
              cellResult.cells.forEach(cell => {
                entries.push({
                  dateTime: dateTimeStr || null,
                  cellId: cell
                });
              });
            } else {
              warnings.push(`Không thể phân tích cell từ dòng: ${cleanLine}`);
            }
          } else {
            // Không có datetime, chỉ có cell
            const cellResult = extractCellsFromText(cleanLine);
            if (cellResult.cells.length > 0) {
              cellResult.cells.forEach(cell => {
                entries.push({
                  dateTime: null,
                  cellId: cell
                });
              });
            } else {
              warnings.push(`Không thể phân tích cell từ dòng: ${cleanLine}`);
            }
          }
        } else {
          // Chế độ tra cell: chỉ lấy cell
          const cellResult = extractCellsFromText(cleanLine);
          if (cellResult.cells.length > 0) {
            cellResult.cells.forEach(cell => {
              entries.push({
                dateTime: null,
                cellId: cell
              });
            });
          } else {
            warnings.push(`Không thể phân tích cell từ dòng: ${cleanLine}`);
          }
        }
      }
      
      return {
        entries: entries,
        warnings: warnings
      };
    }

    function extractCellsFromText(text) {
      const cells = [];
      const warnings = [];
      const lines = text.split(/[\r\n,;|\t]+/);
      
      // Enhanced patterns to support both short and full formats
      const fullCellPattern = /\b\d{3}\.\d{1,3}\.\d{1,8}\.\d{1,15}\b/g;
      const shortCellPattern = /\b\d{1,3}\.\d{1,8}\.\d{1,15}\b/g;
      const continuousPattern = /\b\d{7,25}\b/g;
      
      for (let line of lines) {
        const cleanLine = line.trim();
        if (!cleanLine) continue;
        
        // First check for full format (mcc.mnc.lac.cellid)
        const fullMatches = cleanLine.match(fullCellPattern);
        if (fullMatches) {
          fullMatches.forEach(match => {
            const parseResult = parseSmartCellFormat(match);
            if (parseResult.success) {
              cells.push(parseResult.cellId);
            } else {
              warnings.push(`Cell ID đầy đủ không hợp lệ: ${match} - ${parseResult.reason}`);
            }
          });
          continue;
        }
        
        // Then check for short format (mnc.lac.cellid)
        const shortMatches = cleanLine.match(shortCellPattern);
        if (shortMatches) {
          shortMatches.forEach(match => {
            const parseResult = parseSmartCellFormat(match);
            if (parseResult.success) {
              cells.push(parseResult.cellId);
            } else {
              warnings.push(`Cell ID ngắn không hợp lệ: ${match} - ${parseResult.reason}`);
            }
          });
          continue;
        }
        
        // Finally check for continuous format
        const continuousMatches = cleanLine.match(continuousPattern);
        if (continuousMatches) {
          continuousMatches.forEach(match => {
            const parseResult = parseSmartCellFormat(match);
            if (parseResult.success) {
              cells.push(parseResult.cellId);
            } else {
              warnings.push(`Không thể phân tích cell liền: ${match} - ${parseResult.reason}`);
            }
          });
          continue;
        }
        
        if (cleanLine.length > 0 && /\d/.test(cleanLine)) {
          warnings.push(`Dòng chứa số nhưng không khớp định dạng cell: ${cleanLine.substring(0, 50)}...`);
        }
      }
      
      const uniqueCells = Array.from(new Set(cells))
        .filter(cell => {
          const parts = cell.split('.');
          return parts.length === 3 && parts.every(part => part.length > 0 && /^\d+$/.test(part));
        });
      
      return {
        cells: uniqueCells,
        warnings: warnings
      };
    }

    function parseContinuousCellFixed(cellString) {
      if (cellString.length < 10) {
        return {
          success: false,
          reason: `Chuỗi quá ngắn (${cellString.length} ký tự, cần tối thiểu 10)`
        };
      }
      
      if (cellString.length > 25) {
        return {
          success: false,
          reason: `Chuỗi quá dài (${cellString.length} ký tự, tối đa 25)`
        };
      }
      
      // Parse according to structure: MCC(3) + MNC(2) + LAC(5) + CellID(remaining)
      const mcc = cellString.substring(0, 3);
      const mnc = cellString.substring(3, 5);
      const lac = cellString.substring(5, 10);
      const cellid = cellString.substring(10);
      
      if (cellid.length === 0) {
        return {
          success: false,
          reason: "Không đủ ký tự cho CellID (cần ít nhất 1 ký tự sau LAC 5 ký tự)"
        };
      }
      
      if (cellid.length > 15) {
        return {
          success: false,
          reason: `CellID quá dài (${cellid.length} ký tự, tối đa 15)`
        };
      }
      
      const mccNum = parseInt(mcc);
      if (mccNum < 200 || mccNum > 999) {
        return {
          success: false,
          reason: `MCC không hợp lệ: ${mcc} (phải từ 200-999)`
        };
      }
      
      // Check if cell ID needs conversion (starts with '0')
      let finalCellId = cellid;
      let conversionApplied = false;
      
      if (cellid.startsWith('0')) {
        const conversionResult = convertCellId(cellid);
        if (conversionResult.converted) {
          finalCellId = conversionResult.newCellId;
          conversionApplied = true;
        }
      }
      
      const cleanMnc = mnc.replace(/^0+/, '') || mnc.slice(-1);
      const cleanLac = lac.replace(/^0+/, '') || lac.slice(-1);
      const cleanCellId = finalCellId.replace(/^0+/, '') || finalCellId.slice(-1);
      
      return {
        success: true,
        cellId: `${cleanMnc}.${cleanLac}.${cleanCellId}`,
        originalFormat: cellString,
        parsed: {
          mcc: mcc,
          mnc: cleanMnc,
          lac: cleanLac,
          cellid: finalCellId
        },
        conversionApplied: conversionApplied,
        originalCellId: conversionApplied ? cellid : null,
        method: "Định dạng cố định: MCC(3) + MNC(2) + LAC(5) + CellID"
      };
    }

    function showImportStatus(message, isError, isWarning = false) {
      importStatus.textContent = message;
      if (isError) {
        importStatus.className = 'import-status error';
      } else if (isWarning) {
        importStatus.className = 'import-status warning';
      } else {
        importStatus.className = 'import-status success';
      }
      importStatus.style.display = 'block';
      
      setTimeout(() => {
        importStatus.style.display = 'none';
      }, isError || isWarning ? 10000 : 5000);
    }

    function checkDuplicates() {
      const lines = cellInput.value.split("\n").map(s => s.trim()).filter(s => s.length > 0);
      if (lines.length === 0) {
        hideDuplicateSection();
        return;
      }

      const cellCount = {};
      const duplicates = {};
      
      lines.forEach(line => {
        const cell = extractCellFromLine(line);
        if (cell) {
          cellCount[cell] = (cellCount[cell] || 0) + 1;
        }
      });
      
      Object.keys(cellCount).forEach(cell => {
        if (cellCount[cell] > 1) {
          duplicates[cell] = cellCount[cell];
        }
      });
      
      const duplicateKeys = Object.keys(duplicates);
      
      if (duplicateKeys.length === 0) {
        hideDuplicateSection();
        return;
      }
      
      duplicateSection.classList.add('show');
      duplicateCount.textContent = duplicateKeys.length;
      
      let duplicateHtml = '';
      duplicateKeys.forEach(cell => {
        duplicateHtml += `<div class="duplicate-item">${cell} <span style="color:#f44336;font-weight:bold;">(${duplicates[cell]} lần)</span></div>`;
      });
      
      duplicateList.innerHTML = duplicateHtml;
    }

    function extractCellFromLine(line) {
      if (currentMode === 'analyze') {
        const dateTimeCellPattern = /^(.+?)\s*[\|\,\t]\s*(.+)$/;
        const match = line.match(dateTimeCellPattern);
        
        if (match) {
          return match[2].trim();
        } else {
          return line;
        }
      } else {
        return line;
      }
    }

    function removeDuplicates() {
      const lines = cellInput.value.split("\n").map(s => s.trim()).filter(s => s.length > 0);
      const seenCells = new Set();
      const uniqueLines = [];
      let removedCount = 0;
      
      lines.forEach(line => {
        const cell = extractCellFromLine(line);
        if (cell && !seenCells.has(cell)) {
          seenCells.add(cell);
          uniqueLines.push(line);
        } else {
          removedCount++;
        }
      });
      
      cellInput.value = uniqueLines.join("\n");
      hideDuplicateSection();
      
      if (removedCount > 0) {
        showImportStatus(`Đã xóa ${removedCount} dòng có cell trùng lặp. Còn lại ${uniqueLines.length} dòng duy nhất.`, false);
      } else {
        showImportStatus("Không có cell trùng lặp để xóa.", false);
      }
    }

    function keepDuplicates() {
      const lines = cellInput.value.split("\n").map(s => s.trim()).filter(s => s.length > 0);
      const cellCount = {};
      const duplicateLines = [];
      
      lines.forEach(line => {
        const cell = extractCellFromLine(line);
        if (cell) {
          cellCount[cell] = (cellCount[cell] || 0) + 1;
        }
      });
      
      lines.forEach(line => {
        const cell = extractCellFromLine(line);
        if (cell && cellCount[cell] > 1) {
          duplicateLines.push(line);
        }
      });
      
      cellInput.value = duplicateLines.join("\n");
      hideDuplicateSection();
      
      if (duplicateLines.length > 0) {
        showImportStatus(`Đã giữ lại ${duplicateLines.length} dòng có cell trùng lặp. Xóa ${lines.length - duplicateLines.length} dòng cell duy nhất.`, false);
      } else {
        showImportStatus("Không có cell trùng lặp để giữ lại.", false);
      }
    }

    function hideDuplicateSection() {
      duplicateSection.classList.remove('show');
    }

    cellInput.addEventListener('input', debounce(checkDuplicates, 500));
    cellInput.addEventListener('paste', () => {
      setTimeout(checkDuplicates, 100);
    });

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }
